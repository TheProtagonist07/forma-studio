<svg width="1600" height="400" viewBox="0 0 1600 400" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="FORMA — Designs that live. A digital design museum.">
  <defs>
    <radialGradient id="glow" cx="0.78" cy="0.55" r="0.5">
      <stop offset="0" stop-color="#d9a468" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#d9a468" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="vglow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#d9a468" stop-opacity="0.25"/>
      <stop offset="1" stop-color="#d9a468" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="vbody" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#2a2117"/>
      <stop offset="0.35" stop-color="#6e5638"/>
      <stop offset="0.52" stop-color="#e8c896"/>
      <stop offset="0.7" stop-color="#6e5638"/>
      <stop offset="1" stop-color="#221a12"/>
    </linearGradient>
    <linearGradient id="cone" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#d9a468" stop-opacity="0"/>
      <stop offset="1" stop-color="#d9a468" stop-opacity="0.10"/>
    </linearGradient>
    <linearGradient id="rule" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#a8723c"/>
      <stop offset="1" stop-color="#a8723c" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- backdrop -->
  <rect width="1600" height="400" fill="#0b0907"/>
  <rect width="1600" height="400" fill="url(#glow)"/>

  <!-- dust -->
  <g fill="#d9a468">
    <circle cx="240" cy="74" r="1.6" opacity="0.35"/>
    <circle cx="540" cy="48" r="1.2" opacity="0.25"/>
    <circle cx="760" cy="120" r="1.8" opacity="0.3"/>
    <circle cx="940" cy="60" r="1.3" opacity="0.35"/>
    <circle cx="1060" cy="180" r="1.5" opacity="0.25"/>
    <circle cx="1380" cy="70" r="1.4" opacity="0.3"/>
    <circle cx="1500" cy="210" r="1.7" opacity="0.3"/>
    <circle cx="1180" cy="330" r="1.3" opacity="0.25"/>
    <circle cx="420" cy="320" r="1.5" opacity="0.25"/>
    <circle cx="660" cy="260" r="1.1" opacity="0.2"/>
  </g>

  <!-- spotlight cone over vessel -->
  <polygon points="1232,0 1288,0 1390,392 1130,392" fill="url(#cone)"/>

  <!-- vessel -->
  <g transform="translate(1140,44) scale(0.92)">
    <ellipse cx="120" cy="170" rx="190" ry="190" fill="url(#vglow)"/>
    <path d="M95 12 C95 4 145 4 145 12 C145 38 132 56 134 84 C158 108 178 142 178 192 C178 262 152 318 120 318 C88 318 62 262 62 192 C62 142 82 108 106 84 C108 56 95 38 95 12 Z" fill="url(#vbody)"/>
    <g stroke="#0b0907" stroke-width="1.6" opacity="0.55" fill="none">
      <path d="M70 150 Q120 178 170 150"/><path d="M64 185 Q120 215 176 185"/>
      <path d="M63 220 Q120 250 177 220"/><path d="M68 255 Q120 283 172 255"/>
      <path d="M78 288 Q120 312 162 288"/><path d="M82 120 Q120 142 158 120"/>
    </g>
    <g stroke="#0b0907" stroke-width="1.4" opacity="0.4" fill="none">
      <path d="M120 86 C90 130 76 200 95 312"/><path d="M120 86 C150 130 164 200 145 312"/>
      <path d="M104 90 C70 150 66 230 112 316"/><path d="M136 90 C170 150 174 230 128 316"/>
      <path d="M120 86 C120 160 120 240 120 318"/>
    </g>
    <ellipse cx="120" cy="13" rx="25" ry="7" fill="#171108"/>
    <!-- plinth -->
    <rect x="28" y="322" width="184" height="8" rx="2" fill="#241c12"/>
    <ellipse cx="120" cy="344" rx="150" ry="10" fill="#d9a468" opacity="0.06"/>
  </g>

  <!-- copy block -->
  <line x1="112" y1="108" x2="160" y2="108" stroke="#a8723c" stroke-width="1.5"/>
  <text x="176" y="113" font-family="'Courier New', Courier, monospace" font-size="15" letter-spacing="6" fill="#d9a468">A DESIGN &amp; MANUFACTURING STUDIO</text>

  <text x="108" y="208" font-family="Georgia, 'Times New Roman', serif" font-size="92" letter-spacing="26" fill="#ede4d7">FORM<tspan fill="#d9a468">A</tspan></text>

  <text x="112" y="268" font-family="Georgia, 'Times New Roman', serif" font-style="italic" font-size="33" letter-spacing="2" fill="#d9a468">Designs that live.</text>

  <line x1="112" y1="306" x2="700" y2="306" stroke="url(#rule)" stroke-width="1"/>

  <text x="112" y="340" font-family="'Courier New', Courier, monospace" font-size="14" letter-spacing="4" fill="#9b8c79">A DIGITAL DESIGN MUSEUM &#183; PARAMETRIC OBJECTS &#183; PRINTED LAYER BY LAYER</text>
  <text x="112" y="368" font-family="'Courier New', Courier, monospace" font-size="13" letter-spacing="4" fill="#5e5446">ROOMS&#8201;&#8212;&#8201;KANSO &#183; HEARTH &#183; VOLTA &#183; TERRA</text>
</svg>
